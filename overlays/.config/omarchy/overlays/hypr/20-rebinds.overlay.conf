# Override-oriented.
# For each Omarchy default bind I change, unbind first, then redefine.
# In Hyprland, unbind key names are case-sensitive and must exactly match the original bind.

$terminal = uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
$browser = omarchy-launch-browser

# Omarchy defaults include these keys, so remove them before redefining.
unbind = SUPER, RETURN
unbind = SUPER SHIFT, F
unbind = SUPER SHIFT, B
unbind = SUPER SHIFT, M
unbind = SUPER SHIFT, N
unbind = SUPER SHIFT, D
unbind = SUPER SHIFT, G
unbind = SUPER SHIFT, O
unbind = SUPER SHIFT, SLASH
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT, C
unbind = SUPER SHIFT, E
unbind = SUPER SHIFT, Y
unbind = SUPER SHIFT, X
unbind = SUPER SHIFT ALT, X

bindd = SUPER, RETURN, Terminal, exec, $terminal
bindd = SUPER, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, M, Monitor TUI, exec, $terminal hyprdynamicmonitors tui
bindd = SUPER, N, Helix, exec, $terminal helix
bindd = SUPER, T, Activity, exec, $terminal btop
bindd = SUPER, D, Docker, exec, $terminal lazydocker
bindd = SUPER, G, Matrix, exec, omarchy-launch-webapp "https://matrix.tuwien.ac.at"
bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, SLASH, Passwords, exec, uwsm-app -- 1password

bindd = SUPER, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com"
bindd = SUPER, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://mail.tuwien.ac.at"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"
