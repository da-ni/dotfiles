# Monitor/env config for this machine.
# Verify there are no conflicting default monitor declarations still active.
# See https://wiki.hypr.land/Configuring/Monitors/

# List current monitors and possible resolutions:
#   hyprctl monitors

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor = , preferred, auto, 1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor = , preferred, auto, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

# Lenovo Ultrawide
monitor = desc:Lenovo Group Limited P40w-20 V90D9WWE, preferred, auto, 1.666667

# Fallback
monitor = , preferred, auto, 1.333333
